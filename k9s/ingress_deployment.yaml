apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi

  template:
    metadata:
      labels:
        app: fastapi

    spec:
      containers:
        - name: fastapi
          image: fastapi-app:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 8000