name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3


    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi:${{ github.sha }} .


    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/fastapi:${{ github.sha }}


    - name: Deploy to Kubernetes
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
        export KUBECONFIG=kubeconfig

        sed -i "s|your-dockerhub/fastapi:latest|${{ secrets.DOCKER_USERNAME }}/fastapi:${{ github.sha }}|g" k8s/deployment.yaml

        kubectl apply -f k8s/